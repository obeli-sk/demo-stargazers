[[activity_wasm]]
name = "activity_llm_openai"
location = "${DEPLOYMENT_DIR}/target/wasm32-wasip2/release/activity_llm_openai.wasm"
exec.lock_expiry.seconds = 10
env_vars = [{key="OPENAI_API_BASE_URL", value="${OPENAI_API_BASE_URL:-https://api.openai.com}"}]
[[activity_wasm.allowed_host]]
pattern = "${OPENAI_API_BASE_URL:-https://api.openai.com}"
methods = ["POST"]
[activity_wasm.allowed_host.secrets]
env_vars = ["OPENAI_API_KEY"]
replace_in = ["headers"]

[[activity_wasm]]
name = "activity_github_impl"
location = "${DEPLOYMENT_DIR}/target/wasm32-wasip2/release/activity_github_impl.wasm"
exec.lock_expiry.seconds = 5
[[activity_wasm.allowed_host]]
pattern = "https://api.github.com"
methods = ["POST"]
[activity_wasm.allowed_host.secrets]
env_vars = ["GITHUB_TOKEN"]
replace_in = ["headers"]

[[activity_wasm]]
name = "activity_db_turso"
location = "${DEPLOYMENT_DIR}/target/wasm32-wasip2/release/activity_db_turso.wasm"
env_vars = ["TURSO_LOCATION"]
exec.lock_expiry.seconds = 5
[[activity_wasm.allowed_host]]
pattern = "${TURSO_LOCATION}"
methods = ["POST"]
[activity_wasm.allowed_host.secrets]
env_vars = ["TURSO_TOKEN"]
replace_in = ["headers"]

[[workflow_wasm]]
name = "workflow_go"
location = "${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/dist/workflow-go.wasm"
stub_wasi = true
[workflow_wasm.backtrace.sources]
"${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/main.go" =                                                                  "${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/main.go"
"${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/workflow/stargazers/workflow/stargazers/workflow.wasm.go" =  "${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/workflow/stargazers/workflow/stargazers/workflow.wasm.go"
"${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/github-obelisk-ext/account/account.wit.go" =                 "${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/github-obelisk-ext/account/account.wit.go"
"${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/db-obelisk-ext/llm/llm.wit.go" =                             "${DEPLOYMENT_DIR}/workflow/stargazers/workflow-go/gen/stargazers/db-obelisk-ext/llm/llm.wit.go"

[[webhook_endpoint_wasm]]
name = "webhook"
location = "${DEPLOYMENT_DIR}/target/wasm32-wasip2/release/webhook.wasm"
routes = [{ methods = ["POST", "GET"], route = "" }]
env_vars = [
  "GITHUB_WEBHOOK_SECRET",
  # "GITHUB_WEBHOOK_INSECURE=true" # to disable signature verification
]
backtrace.sources = { ".../src/lib.rs" = "${DEPLOYMENT_DIR}/webhook/webhook-rs/src/lib.rs" }

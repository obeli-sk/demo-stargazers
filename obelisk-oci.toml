api.listening_addr = "127.0.0.1:5005"   # Address and port on which the API server will listen.
webui.listening_addr = "127.0.0.1:8080" # Address and port on which the webui will listen.

[log.stdout]
enabled = true

[[activity_wasm]]
name = "activity_llm_chatgpt"
location.oci = "docker.io/getobelisk/demo_stargazersactivity_llm_chatgpt:parallel-2025-01-22@sha256:298c44cd3c3e4245ad0ee223f5df10ab7a9730568bcca86a08d260cb51c17c91"
exec.lock_expiry.secs = 10
env_vars = ["OPENAI_API_KEY"]

[[activity_wasm]]
name = "activity_account_github"
location.oci = "docker.io/getobelisk/demo_stargazersactivity_account_github:parallel-2025-01-22@sha256:99c2f9e89d63cb6daebd43fa2882c6cf8cb7c120ac40626550420725159c5e68"
env_vars = ["GITHUB_TOKEN"]
exec.lock_expiry.secs = 5

[[activity_wasm]]
name = "activity_db_turso"
location.oci = "docker.io/getobelisk/demo_stargazersactivity_db_turso:parallel-2025-01-22@sha256:4aa96b8cc4613e4494e7038cff36e2019373cc36408ea64b1106cde67f01f784"
env_vars = ["TURSO_TOKEN", "TURSO_LOCATION"]

[[workflow]]
name = "workflow"
location.oci = "docker.io/getobelisk/demo_stargazersworkflow:parallel-2025-01-22@sha256:d68e4ae92bbe81759a8e2427e7e5a2b8889aa9a3311526fc214d66793c9337fa"

[[http_server]]
name = "webhook_server"
listening_addr = "0.0.0.0:9090"

[[webhook_endpoint]]
name = "webhook"
location.oci = "docker.io/getobelisk/demo_stargazerswebhook:parallel-2025-01-22@sha256:3e9d3df01346fdc0502584d108f63ca416f0cce24a7d1af3c274b07a3430b87c"
http_server = "webhook_server"
routes = [{ methods = ["POST", "GET"], route = "" }]
forward_stdout = "stderr"
forward_stderr = "stderr"
env_vars = [
    "GITHUB_WEBHOOK_SECRET",
    # "GITHUB_WEBHOOK_INSECURE=true" # to disable signature verification
]
